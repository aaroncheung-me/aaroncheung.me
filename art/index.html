<!Doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <script>
        // Art site: independent theme (defaults light), shared CRT/motion/palette
        document.documentElement.setAttribute("data-theme", localStorage.getItem("art-site-theme") || "light");
        var _osRM = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        var _savedMotion = localStorage.getItem("site-reduced-motion");
        if (_savedMotion === "true" || (_savedMotion === null && _osRM)) {
            document.documentElement.setAttribute("data-reduced-motion", "true");
        }
        var _savedCrt = localStorage.getItem("site-crt");
        if (_savedCrt === "on" || (_savedCrt === null && !_osRM)) {
            document.documentElement.setAttribute("data-crt", "on");
        }
        var _savedPalette = localStorage.getItem("site-palette");
        if (_savedPalette && _savedPalette !== "default") {
            document.documentElement.setAttribute("data-palette", _savedPalette);
        }
        var _savedArtFont = localStorage.getItem("art-site-font");
        if (_savedArtFont && _savedArtFont !== "caveat") {
            document.documentElement.setAttribute("data-art-font", _savedArtFont);
        }
        var _savedArtPalette = localStorage.getItem("art-site-palette");
        if (_savedArtPalette && _savedArtPalette !== "warm") {
            document.documentElement.setAttribute("data-art-palette", _savedArtPalette);
        }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#16120d">
    <meta name="author" content="Aaron Cheung" />
    <meta name="description" content="Digital art by Aaron Cheung — illustrations and digital paintings made in Krita." />
    <meta property="og:title" content="Aaron Cheung — Art" />
    <meta property="og:description" content="Digital art by Aaron Cheung." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aaroncheung.me/art/" />

    <link rel="preload" as="font" href="/fonts/fira-mono-v14-latin-regular.woff2" type="font/woff2"
        crossorigin="anonymous">
    <link rel="preload" as="font" href="/fonts/fira-mono-v14-latin-700.woff2" type="font/woff2" crossorigin="anonymous">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/tui.css?v=8">
    <link rel="stylesheet" href="css/art.css">

    <script src="/js/overlay-esc.js" defer></script>
    <script src="/js/theme.js" defer></script>
    <script src="/js/include-partials.js" defer></script>
    <script src="js/glitch-hero.js" defer></script>
    <script src="/js/glitch-artifacts.js" defer></script>
    <script src="js/mesh-grid.js" defer></script>
    <script src="js/gallery.js" defer></script>
    <script src="js/pages.js" defer></script>

    <title>Aaron Cheung — Art</title>
</head>

<body>
    <div data-include="/partials/mobile-header.html"></div>

    <!-- Nav (rendered by js/pages.js): 4 boxes, current page as info box,
         others as alert links; mobile hides it behind #nav-toggle. -->
    <div id="nav-list"></div>
    <button id="nav-toggle" type="button" aria-label="menu" aria-expanded="false" aria-controls="nav-list">☰</button>

    <div id="art-main" role="main">
        <section class="glitch-hero" id="glitch-hero">
            <div class="glitch-hero-bg" id="glitch-hero-bg">
                <img src="images/juniper.png" alt="" loading="eager" fetchpriority="high">
            </div>
            <div class="glitch-hero-texture" aria-hidden="true"></div>
            <!-- Ambient glitch artifacts (js/glitch-artifacts.js), fixed/full-viewport so position here doesn't matter. -->
            <div id="glitch-artifacts" aria-hidden="true"></div>
            <!-- Per-page background text (e.g. About's bio), sits behind the error-windows; hidden unless the page sets it. -->
            <div id="hero-bg-text" hidden></div>
            <div class="error-window" id="error-window-1">
                <div class="error-window-bar">
                    <span class="error-window-fname">chrchie.png</span>
                    <span class="error-window-code">0xE001</span>
                    <span class="error-window-x">✕</span>
                </div>
                <div class="error-window-viewport">
                    <img class="error-window-img error-window-img-normal" src="images/juniper.png" alt="" draggable="false">
                    <img class="error-window-img error-window-img-zoom" src="images/juniper.png" alt="" draggable="false">
                </div>
            </div>
            <div class="error-window" id="error-window-2">
                <div class="error-window-bar">
                    <span class="error-window-fname">chrchie.png~</span>
                    <span class="error-window-code">0xE002</span>
                    <span class="error-window-x">✕</span>
                </div>
                <div class="error-window-viewport">
                    <img class="error-window-img error-window-img-normal" src="images/juniper.png" alt="" draggable="false">
                    <img class="error-window-img error-window-img-zoom" src="images/juniper.png" alt="" draggable="false">
                </div>
            </div>
            <div class="error-window" id="error-window-3">
                <div class="error-window-bar">
                    <span class="error-window-fname">chrchie(2).png</span>
                    <span class="error-window-code">0xE003</span>
                    <span class="error-window-x">✕</span>
                </div>
                <div class="error-window-viewport">
                    <img class="error-window-img error-window-img-normal" src="images/juniper.png" alt="" draggable="false">
                    <img class="error-window-img error-window-img-zoom" src="images/juniper.png" alt="" draggable="false">
                </div>
            </div>
            <div class="error-window" id="error-window-4">
                <div class="error-window-bar">
                    <span class="error-window-fname">chrchie.png.bak</span>
                    <span class="error-window-code">0xE004</span>
                    <span class="error-window-x">✕</span>
                </div>
                <div class="error-window-viewport">
                    <img class="error-window-img error-window-img-normal" src="images/juniper.png" alt="" draggable="false">
                    <img class="error-window-img error-window-img-zoom" src="images/juniper.png" alt="" draggable="false">
                </div>
            </div>
            <!-- Gallery-only: one non-closable popup per piece, built by js/gallery.js. -->
            <div id="gallery-popups"></div>
            <!-- Per-page text windows (bio fields, commission info, etc.), populated by js/pages.js. -->
            <div id="page-popups"></div>
            <p class="glitch-hero-hint">drag the windows</p>
            <div class="glitch-hero-toast" id="glitch-hero-toast">ERR 0x4C49 — light_mode.exe not responding</div>
        </section>
    </div>

    <!-- Gallery lightbox — click any gallery popup's artwork to open -->
    <div id="art-lightbox" hidden>
        <button id="art-lb-prev" type="button" aria-label="previous piece">‹</button>
        <div id="art-lb-inner">
            <button id="art-lb-close" type="button" aria-label="close">✕</button>
            <img id="art-lb-img" src="" alt="">
            <div id="art-lb-caption">
                <span id="art-lb-title"></span>
                <span id="art-lb-meta"></span>
            </div>
            <p id="art-lb-desc"></p>
        </div>
        <button id="art-lb-next" type="button" aria-label="next piece">›</button>
    </div>

    <!-- Footer popup (for theme/font popups — same ID as portfolio) -->
    <div id="footer-popup" hidden></div>

    <div data-include="/partials/footer.html"></div>

    <script>
        // Initialise partials once theme.js and include-partials.js are ready
        document.addEventListener('DOMContentLoaded', function () {
            if (typeof includePartials === 'function') includePartials();
        });
    </script>
</body>

</html>
